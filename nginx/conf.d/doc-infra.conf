# ============================================================
# doc-infra: 統一文件服務入口（靜態托管）
# 監聽 :8081
# ============================================================

server {
    listen 8081;
    charset utf-8;

    # ===== 首頁 =====
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ===== ngrok URL 查詢 API =====
    location /ngrok-info {
        proxy_pass http://host.docker.internal:4040/api/tunnels;
        proxy_set_header Host $host;
    }

    # ===== 動態產生的 location（static serve）=====
    # 由 sync-agent 根據 config.json 動態生成
    include /etc/nginx/conf.d/locations/*.conf;

    # ===== 原始檔案瀏覽（autoindex） =====
    location /files/ {
        alias /projects/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
