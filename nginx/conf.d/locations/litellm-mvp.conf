# absolute_redirect off 確保透過 ngrok 時 redirect 不走絕對路徑（避免 port 錯）
location = /litellm-mvp {
    absolute_redirect off;
    return 301 /litellm-mvp/;
}

location = /litellm-mvp/ {
    absolute_redirect off;
    return 302 /litellm-mvp/research_conclusion.html;
}

location /litellm-mvp/ {
    alias /projects/litellm/docs/agent_context/mvp_research_conclusion/;
}
