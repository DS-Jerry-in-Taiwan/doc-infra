version: "3.8"

services:
  # ===== nginx 反向代理（統一入口）=====
  nginx:
    image: nginx:alpine
    container_name: doc-infra-nginx
    ports:
      - "8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
      - /home/ubuntu/projects:/projects:ro
      - /home/ubuntu/doc-sites:/doc-sites:ro
    networks:
      - doc-infra-net
    restart: unless-stopped

  # ===== ngrok（外部暴露）=====
  ngrok:
    image: ngrok/ngrok:latest
    container_name: doc-infra-ngrok
    command: http nginx:8081 --log=stdout
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - doc-infra-net
    restart: unless-stopped

networks:
  doc-infra-net:
    driver: bridge
